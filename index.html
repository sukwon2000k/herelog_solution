<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HereLog</title>
    <meta property="og:title" content="HereLog">
    <meta property="og:description" content="여기에 기록하는 우리의 순간">
    <meta property="og:image" content="https://hello2026.dothome.co.kr/herelog/src/image/map3.png">
    <meta property="og:url" content="https://hello2026.dothome.co.kr/herelog">


    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/weather.css">
    <script src="./js/weather.js?v=2" defer></script>
    <script src="./js/index.js?v=2" defer></script>
</head>
<body>
    
    <div class="container">
        <div class="petal-layer" id="petalLayer" aria-hidden="true"></div>
        <div class="header">
            <h2>ここログ</h2>
            <p>여기에 기록하는 이 순간</p>
        </div>
        <div class="mainBtn">
            <button class="start">시작하기</button>
        </div>
        <div class="btn">
            <button id="login">로그인</button>
            <button id="signup">회원가입</button>
        </div>
        <form action="./board/login.php" method="post">
            <div class="log">
                <input class="input" name="id" type="text" id="id" placeholder="아이디를 입력하세요.">
                <input class="input" name="password" type="password" id="pw" placeholder="비밀번호를 입력하세요.">
                <input type="submit" value="로그인">
                <button type="button" class="backBtn"> ← </button>
            </div>
        </form>
        <form action="./board/signup.php" method="post" enctype="multipart/form-data">
            <div class="sign">
                <input type="file" name="profile_img" id="profile_img" accept="image/*" onchange="previewProfile()" hidden>
                <label for="profile_img" class="upload-btn">
                    <span id="uploadText">📷 프로필 사진 등록</span>
                </label>
                <div class="preview-area">
                    <img id="previewImg" src="./board/uploads/profile/default.png">
                    <button
                        type="button"
                        id="removeProfile">
                        ✕
                    </button>
                </div>
                <input class="input" name="name" type="text" id="name" placeholder="이름을 입력하세요.">
                <input class="input" name="nickname" type="text" id="nickname" placeholder="별명을 입력하세요.">
                <input class="input" name="id" type="text" id="id" placeholder="아이디를 입력하세요.">
                <input class="input" name="password" type="password" id="pw" placeholder="비밀번호를 입력하세요.">
                <input type="submit" value="회원가입">
                <button type="button" class="backBtn"> ← </button>
            </div>
        </form>
    </div>
    
</body>
</html>
